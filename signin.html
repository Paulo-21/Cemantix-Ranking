<!DOCTYPE html>

<style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
        }
        .glass-card {
            background: rgba(23, 31, 51, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(208, 188, 255, 0.1);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #a078ff 0%, #0566d9 100%);
        }
        .semantic-glow {
            box-shadow: 0 0 40px -10px rgba(109, 59, 215, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 bg-surface-dim shadow-sm z-50">
<div class="flex justify-between items-center px-lg py-md max-w-container-max mx-auto">
<div class="font-display-md text-display-md font-bold text-primary cursor-pointer active:scale-95 transition-transform">
                Cémantix Stagios
            </div>
<nav class="hidden md:flex gap-lg items-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary-fixed transition-colors" href="#">Explorer</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary-fixed transition-colors" href="/cemantix-ranking/">Podium</a>
<button class="px-md py-sm rounded-xl font-label-sm text-label-sm border border-outline-variant text-primary hover:text-primary-fixed transition-colors cursor-pointer active:scale-95">
                    Login
                </button>
</nav>
<button class="md:hidden text-primary">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-gutter py-xxl relative">
<!-- Atmospheric Background Effect -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary opacity-10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary-container opacity-10 blur-[120px] rounded-full"></div>
</div>
<!-- Registration Card -->
<div class="w-full max-w-md z-10">
<div class="glass-card semantic-glow p-xl rounded-xl space-y-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="text-center space-y-sm">
<h1 class="font-display-md text-display-md text-on-surface tracking-tight">Rejoindre l'élite des Stagios</h1>
<!--<p class="font-body-md text-body-md text-on-surface-variant">Prêt à mesurer votre pulse sémantique ?</p>-->
</div>
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Username Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-primary pl-base" for="username">Nom d'utilisateur</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-md pl-xl pr-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="username" placeholder="votre prénom" type="text"/>
</div>
</div>

<!-- Password Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-primary pl-base" for="password">Mot de passe</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-md pl-xl pr-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-primary pl-base" for="confirm-password">Confirmer le mot de passe</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">verified_user</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-md pl-xl pr-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full primary-gradient py-md rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-white font-bold shadow-lg transform active:scale-[0.98] transition-all hover:brightness-110 flex items-center justify-center gap-sm" type="submit">
<span>S'inscrire ou se connecter</span>
<span class="material-symbols-outlined text-[20px]">bolt</span>
</button>
</form>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full bottom-0 bg-surface-container-lowest border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center px-lg py-xl max-w-container-max mx-auto gap-md">
<div class="flex flex-col md:flex-row items-center gap-md">
<span class="font-display-lg text-[24px] font-bold text-primary">Cémantix Stagios</span>
<p class="font-label-sm text-label-sm text-secondary">© 2026 Cémantix Stagios.</p>
</div>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary-fixed transition-colors" href="#">Privacy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary-fixed transition-colors" href="#">Terms</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary-fixed transition-colors" href="#">Support</a>
</div>
</div>
</footer>
<script>
        // Micro-interaction for input hover/focus states
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').classList.add('scale-105', 'translate-x-1');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').classList.remove('scale-105', 'translate-x-1');
            });
        });

        // Simple enter/exit animations or feedback could be added here
    </script>
</body></html>
