<!doctype html>
<html class="dark" lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Cemantix Friends - Classements</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            background: "#0b1326",
                            surface: "#131b2e",
                            panel: "#171f33",
                            panelHigh: "#222a3d",
                            textMain: "#dae2fd",
                            textMuted: "#aeb8d6",
                            outline: "#494454",
                            primary: "#d0bcff",
                            primaryDark: "#3c0091",
                            secondary: "#adc6ff",
                            accent: "#ffb2b7",
                        },
                        fontFamily: {
                            sans: ["Inter", "sans-serif"],
                            display: ["Montserrat", "sans-serif"],
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background: #0b1326;
                color: #dae2fd;
                font-family: "Inter", sans-serif;
            }

            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }

            .glass-panel {
                background: rgba(23, 31, 51, 0.78);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(149, 142, 160, 0.14);
            }
        </style>
    </head>
    <body class="min-h-screen">
        <header class="mx-auto flex w-full max-w-5xl items-center justify-between px-6 py-6">
            <div>
                <h1 class="font-display text-4xl font-bold leading-none text-primary">Cemantix</h1>
                <p class="mt-1 text-xs font-semibold uppercase tracking-[0.18em] text-textMuted">Friend rankings</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="session-label" class="hidden text-sm font-semibold text-textMuted sm:inline"></span>
                <button id="logout-button" class="hidden h-10 items-center justify-center rounded-lg px-3 text-sm font-bold text-textMuted transition hover:bg-panelHigh hover:text-textMain" type="button">Deconnexion</button>
                <button id="refresh-button" class="flex h-10 w-10 items-center justify-center rounded-lg text-textMuted transition hover:bg-panelHigh hover:text-textMain" type="button" title="Rafraichir">
                    <span class="material-symbols-outlined">refresh</span>
                </button>
            </div>
        </header>

        <main class="mx-auto flex w-full max-w-5xl flex-col gap-8 px-6 pb-16">
            <section>
                <div class="mb-4 flex items-center gap-3">
                    <span class="h-6 w-1 rounded-full bg-primary"></span>
                    <h2 class="font-display text-2xl font-semibold">Compte</h2>
                </div>
                <form id="auth-form" class="glass-panel grid gap-4 rounded-lg p-5 md:grid-cols-[1fr_1fr_auto] md:items-end">
                    <label class="grid gap-2">
                        <span class="text-xs font-semibold uppercase tracking-[0.16em] text-textMuted">Pseudo</span>
                        <input id="auth-username" name="username" class="w-full rounded-lg border-0 bg-panelHigh px-4 py-3 text-base font-semibold text-textMain placeholder:text-textMuted/50 focus:ring-2 focus:ring-primary" maxlength="60" placeholder="Ex: Lea" required />
                    </label>
                    <label class="grid gap-2">
                        <span class="text-xs font-semibold uppercase tracking-[0.16em] text-textMuted">Mot de passe</span>
                        <input id="auth-password" name="password" class="w-full rounded-lg border-0 bg-panelHigh px-4 py-3 text-base font-semibold text-textMain placeholder:text-textMuted/50 focus:ring-2 focus:ring-primary" required type="password" />
                    </label>
                    <div class="grid grid-cols-2 gap-2 md:flex">
                        <button class="inline-flex h-12 items-center justify-center rounded-lg bg-primary px-4 font-bold text-primaryDark transition hover:bg-secondary active:scale-[0.98]" data-auth-action="login" type="submit">Connexion</button>
                        <button class="inline-flex h-12 items-center justify-center rounded-lg bg-panelHigh px-4 font-bold text-textMain transition hover:bg-outline active:scale-[0.98]" data-auth-action="signin" type="submit">Inscription</button>
                    </div>
                </form>
                <p id="auth-message" class="mt-3 min-h-6 text-sm font-semibold text-textMuted" role="status"></p>
            </section>

            <section>
                <div class="mb-4 flex items-center gap-3">
                    <span class="h-6 w-1 rounded-full bg-secondary"></span>
                    <h2 class="font-display text-2xl font-semibold">Saisir son score</h2>
                </div>
                <form id="score-form" class="glass-panel grid gap-4 rounded-lg p-5 md:grid-cols-[180px_auto] md:items-end">
                    <label class="grid gap-2">
                        <span class="text-xs font-semibold uppercase tracking-[0.16em] text-textMuted">Essais</span>
                        <input id="attempts" name="attempts" class="w-full rounded-lg border-0 bg-panelHigh px-4 py-3 text-base font-semibold text-textMain placeholder:text-textMuted/50 focus:ring-2 focus:ring-primary disabled:cursor-not-allowed disabled:opacity-50" min="1" placeholder="42" required type="number" />
                    </label>
                    <button id="score-submit" class="inline-flex h-12 items-center justify-center gap-2 rounded-lg bg-primary px-5 font-bold text-primaryDark transition hover:bg-secondary active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50" type="submit">
                        <span class="material-symbols-outlined text-[20px]">send</span>
                        Envoyer le score
                    </button>
                </form>
                <p id="form-message" class="mt-3 min-h-6 text-sm font-semibold text-textMuted" role="status"></p>
            </section>

            <section class="grid gap-6 lg:grid-cols-2">
                <div>
                    <div class="mb-4 flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3">
                            <span class="h-6 w-1 rounded-full bg-secondary"></span>
                            <h2 class="font-display text-2xl font-semibold">Classement du jour</h2>
                        </div>
                        <span id="today-updated" class="text-xs font-semibold uppercase tracking-[0.16em] text-textMuted">-</span>
                    </div>
                    <div class="glass-panel overflow-hidden rounded-lg">
                        <div class="overflow-x-auto">
                            <table class="w-full min-w-[440px] border-collapse text-left">
                                <thead>
                                    <tr class="border-b border-outline bg-panelHigh">
                                        <th class="w-16 p-4 text-center text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Rang</th>
                                        <th class="p-4 text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Joueur</th>
                                        <th class="p-4 text-center text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Essais</th>
                                        <th class="p-4 text-right text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Heure</th>
                                    </tr>
                                </thead>
                                <tbody id="today-leaderboard" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="mb-4 flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3">
                            <span class="h-6 w-1 rounded-full bg-accent"></span>
                            <h2 class="font-display text-2xl font-semibold">Classement global</h2>
                        </div>
                        <span id="global-updated" class="text-xs font-semibold uppercase tracking-[0.16em] text-textMuted">-</span>
                    </div>
                    <div class="glass-panel overflow-hidden rounded-lg">
                        <div class="overflow-x-auto">
                            <table class="w-full min-w-[480px] border-collapse text-left">
                                <thead>
                                    <tr class="border-b border-outline bg-panelHigh">
                                        <th class="w-16 p-4 text-center text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Rang</th>
                                        <th class="p-4 text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Joueur</th>
                                        <th class="p-4 text-center text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Essais</th>
                                        <th class="p-4 text-right text-xs font-bold uppercase tracking-[0.14em] text-textMuted">Soumis</th>
                                    </tr>
                                </thead>
                                <tbody id="global-leaderboard" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script>
            const authForm = document.getElementById("auth-form");
            const authMessage = document.getElementById("auth-message");
            const form = document.getElementById("score-form");
            const formMessage = document.getElementById("form-message");
            const refreshButton = document.getElementById("refresh-button");
            const logoutButton = document.getElementById("logout-button");
            const sessionLabel = document.getElementById("session-label");
            const attemptsInput = document.getElementById("attempts");
            const scoreSubmit = document.getElementById("score-submit");
            let authAction = "login";

            function session() {
                return {
                    token: localStorage.getItem("cemantixApiToken") || "",
                    username: localStorage.getItem("cemantixUsername") || "",
                };
            }

            function setMessage(target, message, tone = "muted") {
                const colors = {
                    muted: "text-textMuted",
                    success: "text-secondary",
                    error: "text-accent",
                };
                target.textContent = message;
                target.className = `mt-3 min-h-6 text-sm font-semibold ${colors[tone]}`;
            }

            function updateSessionUi() {
                const current = session();
                const isConnected = Boolean(current.token);

                attemptsInput.disabled = !isConnected;
                scoreSubmit.disabled = !isConnected;
                logoutButton.classList.toggle("hidden", !isConnected);
                logoutButton.classList.toggle("flex", isConnected);
                sessionLabel.classList.toggle("hidden", !isConnected);
                sessionLabel.textContent = isConnected ? `Connecte: ${current.username}` : "";

                if (!isConnected) {
                    setMessage(formMessage, "Connecte-toi pour envoyer ton score.");
                } else {
                    setMessage(formMessage, "Ton token est garde sur cet appareil pour les prochains envois.", "success");
                }
            }

            function escapeHtml(value) {
                return String(value).replace(/[&<>'"]/g, (char) => ({
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    "'": "&#039;",
                    '"': "&quot;",
                })[char]);
            }

            function renderRows(targetId, rows, emptyText, includeDate) {
                const target = document.getElementById(targetId);

                if (!rows.length) {
                    target.innerHTML = `<tr><td class="p-6 text-center text-textMuted" colspan="4">${emptyText}</td></tr>`;
                    return;
                }

                target.innerHTML = rows.map((row, index) => {
                    const rankClass = index === 0 ? "bg-primary/20 text-primary" : "bg-panelHigh text-textMuted";
                    const submittedLabel = includeDate
                        ? `${escapeHtml(row.submitted_date)} ${escapeHtml(row.submitted_time)}`
                        : escapeHtml(row.submitted_time);

                    return `
                        <tr class="border-b border-outline/50 transition last:border-b-0 hover:bg-panelHigh/70">
                            <td class="p-4 text-center">
                                <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg font-bold ${rankClass}">${index + 1}</span>
                            </td>
                            <td class="p-4 font-bold text-textMain">${escapeHtml(row.player_name)}</td>
                            <td class="p-4 text-center font-bold text-secondary">${escapeHtml(row.attempts)}</td>
                            <td class="p-4 text-right font-mono text-textMuted">${submittedLabel}</td>
                        </tr>
                    `;
                }).join("");
            }

            async function parseJsonResponse(response) {
                const text = await response.text();

                try {
                    return JSON.parse(text);
                } catch (error) {
                    const plainText = text.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
                    throw new Error(plainText || "Reponse serveur invalide.");
                }
            }

            async function loadLeaderboard(scope) {
                const response = await fetch(`leaderboard.php?scope=${scope}`, {
                    headers: { Accept: "application/json" },
                });
                const data = await parseJsonResponse(response);

                if (!response.ok || !data.success) {
                    throw new Error(data.message || "Impossible de charger le classement.");
                }

                return data.leaderboard;
            }

            async function refreshLeaderboards() {
                refreshButton.disabled = true;
                refreshButton.classList.add("opacity-60");

                try {
                    const [todayRows, globalRows] = await Promise.all([
                        loadLeaderboard("today"),
                        loadLeaderboard("global"),
                    ]);

                    renderRows("today-leaderboard", todayRows, "Aucune soumission aujourd'hui.", false);
                    renderRows("global-leaderboard", globalRows, "Aucune soumission pour le moment.", true);

                    const now = new Date().toLocaleTimeString("fr-FR", {
                        hour: "2-digit",
                        minute: "2-digit",
                    });
                    document.getElementById("today-updated").textContent = `Maj ${now}`;
                    document.getElementById("global-updated").textContent = `Maj ${now}`;
                } catch (error) {
                    setMessage(formMessage, error.message, "error");
                } finally {
                    refreshButton.disabled = false;
                    refreshButton.classList.remove("opacity-60");
                }
            }

            authForm.addEventListener("click", (event) => {
                const button = event.target.closest("[data-auth-action]");
                if (button) {
                    authAction = button.dataset.authAction;
                }
            });

            authForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                setMessage(authMessage, authAction === "login" ? "Connexion..." : "Inscription...");

                try {
                    const formData = new FormData(authForm);
                    const endpoint = authAction === "login" ? "login.php" : "signin.php";
                    const response = await fetch(endpoint, {
                        method: "POST",
                        body: formData,
                        headers: { Accept: "application/json" },
                    });
                    const data = await parseJsonResponse(response);

                    if (!response.ok || !data.success) {
                        throw new Error(data.message || "Authentification impossible.");
                    }

                    localStorage.setItem("cemantixApiToken", data.token);
                    localStorage.setItem("cemantixUsername", formData.get("username"));
                    authForm.reset();
                    setMessage(authMessage, "Connecte. Tu peux envoyer tes requetes avec ton token.", "success");
                    updateSessionUi();
                } catch (error) {
                    setMessage(authMessage, error.message, "error");
                }
            });

            logoutButton.addEventListener("click", () => {
                localStorage.removeItem("cemantixApiToken");
                localStorage.removeItem("cemantixUsername");
                updateSessionUi();
                setMessage(authMessage, "Deconnecte.");
            });

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                const current = session();

                if (!current.token) {
                    setMessage(formMessage, "Connecte-toi avant d'envoyer ton score.", "error");
                    return;
                }

                setMessage(formMessage, "Envoi en cours...");

                try {
                    const formData = new FormData(form);
                    const response = await fetch("submit_score.php", {
                        method: "POST",
                        body: formData,
                        headers: {
                            Accept: "application/json",
                            Authorization: `Bearer ${current.token}`,
                        },
                    });
                    const data = await parseJsonResponse(response);

                    if (!response.ok || !data.success) {
                        throw new Error(data.message || "Le score n'a pas pu etre envoye.");
                    }

                    form.reset();
                    setMessage(formMessage, "Score envoye. Le classement est a jour.", "success");
                    await refreshLeaderboards();
                } catch (error) {
                    setMessage(formMessage, error.message, "error");
                }
            });

            refreshButton.addEventListener("click", refreshLeaderboards);
            updateSessionUi();
            refreshLeaderboards();
        </script>
    </body>
</html>
